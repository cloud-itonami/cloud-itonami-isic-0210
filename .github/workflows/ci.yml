name: CI

# This project's deps.edn pins langgraph and langchain via in-monorepo
# :local/root paths (../../kotoba-lang/langgraph, .../langchain). Those
# don't resolve on a bare single-repo checkout, so the test job
# reconstructs the workspace layout by checking out both siblings (both
# PUBLIC) into the expected relative paths -- no token needed. Same
# pattern as cloud-itonami-isic-2733 / cloud-itonami-isic-6209 /
# cloud-itonami-isic-4520.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: clj-kondo (errors fail the build)
        run: clojure -M:lint

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: { path: orgs/cloud-itonami/cloud-itonami-isic-0210 }
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langgraph
          path: orgs/kotoba-lang/langgraph
      - uses: actions/checkout@v4
        with:
          repository: kotoba-lang/langchain
          path: orgs/kotoba-lang/langchain
      - uses: actions/setup-java@v4
        with: { distribution: temurin, java-version: "21" }
      - uses: DeLaGuardo/setup-clojure@13.4
        with: { cli: latest }
      - name: test (governor contract · operation · registry · phases · store)
        working-directory: orgs/cloud-itonami/cloud-itonami-isic-0210
        run: clojure -M:dev:test
